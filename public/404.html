<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
  </head>
  <body>
    <script>
      // GitHub Pages serves this file for unknown routes; redirect to SPA entry.
      (function redirectToSpa() {
        var pathname = window.location.pathname;
        var searchParams = new URLSearchParams(window.location.search);
        var redirectUrl = '/?path=' + encodeURIComponent(pathname);

        // Preserve legacy post query support when present.
        if (searchParams.has('post')) {
          redirectUrl += '&post=' + encodeURIComponent(searchParams.get('post'));
        }

        window.location.replace(redirectUrl + window.location.hash);
      })();
    </script>
  </body>
</html>
